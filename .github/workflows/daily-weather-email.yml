name: Daily Belfast Weather Email

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-weather-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytz
      - name: Send Belfast weather email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python weather_email.py
